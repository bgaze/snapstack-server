name: Publish

# Publishes snapstack-server to npm when a version tag is pushed (e.g. v1.2.0).
# Auth: npm Trusted Publishing (OIDC) — NO token/secret. Configure the trusted publisher
# once on npmjs.com (package Settings: user `bgaze`, repo `snapstack-server`, workflow
# `publish.yml`, action `npm publish`). The very first publish (1.0.0) is done manually
# from a logged-in machine because trusted publishing can't bootstrap a brand-new package.
# Provenance is emitted automatically (publishConfig.provenance + the id-token permission).
# The server self-updates on each (re)start via `npm install --prefix <appDir>
# snapstack-server@latest` (see lib/install.js), so a publish reaches users on next restart.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted publishing (OIDC) requires npm >= 11.5.1 — newer than the one bundled with Node.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Fail fast if the tag and package.json version disagree.
      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          test "$tag" = "$pkg" || { echo "tag $tag != package.json $pkg"; exit 1; }
      - run: npm publish # OIDC trusted publishing — no token, provenance automatic
